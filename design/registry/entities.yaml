# Game World Entity Registry
#
# PURPOSE: Single source of truth for all named game-world facts that appear
# in more than one document. Skills check this before writing new content to
# detect cross-doc inconsistencies at authoring time.
#
# RULES:
#   - Only register facts that cross system boundaries. Internal-only facts
#     (a formula used in one GDD only) do NOT need to be registered.
#   - Never delete entries — set status: deprecated instead.
#   - When a value changes: update the value, set revised: to today's date,
#     and add a comment with the old value and which GDD changed it.
#   - source: is the authoritative GDD — the one that "owns" this fact.
#     Other GDDs that reference it list themselves in referenced_by.
#   - When a new GDD references an existing entry, append its path to
#     referenced_by. Do not create a duplicate entry.
#
# WRITTEN BY: /design-system (Phase 5 — after GDD sections are approved)
#             /consistency-check (when resolving conflicts)
# READ BY:    /design-system (Phase 2 — before authoring begins, and after
#               Section C/D writes to conflict-check new entities/formulas)
#             /consistency-check (primary input — grep-first, GDD-second)
#             /review-all-gdds (Phase 1 — baseline for Phase 2 checks)
#             /architecture-review (data structure and interface validation)
#
# SEARCH PATTERNS (for skills using Grep):
#   All entity names:        Grep pattern="^  - name:" path="design/registry/entities.yaml"
#   Specific entity:         Grep pattern="  - name: goblin" path="design/registry/entities.yaml"
#   All items:               Grep pattern="^  - name:" path="design/registry/entities.yaml" (items section)
#   What combat.md owns:     Grep pattern="source: design/gdd/combat.md"
#   What inventory.md uses:  Grep pattern="referenced_by.*inventory"
#   All gold values:          Grep pattern="value_gold:"
#   Deprecated entries:      Grep pattern="status: deprecated"
#
# FORMAT: YAML. Consistent indentation is critical for grep reliability.
#   Sections: entities | items | formulas | constants
#   Each entry: name, status, source, referenced_by[], attributes{}, added, revised

version: 1
last_updated: "2026-04-08"

# ─── ENTITIES ────────────────────────────────────────────────────────────────

entities: []

# ─── ITEMS ───────────────────────────────────────────────────────────────────
# MVP catalogue objects are defined in catalogue-objets.md only.
# They will be promoted to cross-system items when S02 or S04 GDDs reference
# specific values (e.g. chaise.melee_damage_base, bouteille.throw_damage_base).

items: []

# ─── FORMULAS ────────────────────────────────────────────────────────────────

formulas:
  - name: damage_formula
    status: active
    source: design/gdd/systeme-degats.md
    referenced_by:
      - design/gdd/systeme-degats.md
      - design/gdd/catalogue-objets.md  # provides damage_base and stage_mult inputs
    variables:
      - damage_base   # int, 1–15, provided by caller (S02 reads from catalogue, S09 from enemy def)
      - stage_mult    # float, 0.5–2.0, provided by caller from stage_data
      - damage_type   # DamageType enum: MELEE | THROW | ENEMY_MELEE (pass-through for feedback, does not affect math)
    output_range: [1, 30]
    expression: "max(DAMAGE_MIN, floori(damage_base * stage_mult))"
    notes: "DAMAGE_MIN=1 is the floor (see constants). Max theoretical MVP: floori(15 * 2.0)=30.
      No DAMAGE_CAP for MVP. S05 provides damage_base values; S05 F3 (stage transition) determines
      which stage_mult is active. S02 is the primary caller; S09 also calls for enemy attacks
      with stage_mult=1.0. Any new system calling this formula must register in referenced_by."
    added: 2026-04-08
    revised: ""

# ─── CONSTANTS ───────────────────────────────────────────────────────────────

constants:
  - name: DAMAGE_MIN
    status: active
    source: design/gdd/systeme-degats.md
    referenced_by:
      - design/gdd/systeme-degats.md
      - design/gdd/catalogue-objets.md  # catalogue guarantees melee_damage_base >= 1 (consistent)
    value: 1
    unit: HP
    notes: "Absolute floor for damage_formula output. Every player action or enemy attack
      deals at least 1 HP damage. Systems receiving damage (S07, S08) can rely on this floor."
    added: 2026-04-08
    revised: ""

  - name: HP_ennemi_basique
    status: active
    source: design/gdd/systeme-degats.md
    referenced_by:
      - design/gdd/systeme-degats.md
      - design/gdd/catalogue-objets.md  # calibration anchor for damage_base values and kill-feel target
    value: 12
    unit: HP
    notes: "Baseline HP for a standard enemy in MVP. Used in S06 kill-feel calibration
      (2-3 melee hits = 7+7=14 >= 12) and S05 (damage_base values chosen so chaise/lampe kill
      in 2-3 hits). S08 (enemy health system) MUST use this value as its baseline when designed.
      If S08 changes this, update S05 damage_base values and S06 calibration examples."
    added: 2026-04-08
    revised: ""

  - name: KILL_FEEL_MAX
    status: active
    source: design/gdd/systeme-degats.md
    referenced_by:
      - design/gdd/systeme-degats.md
      - design/gdd/catalogue-objets.md  # all damage_base values must satisfy this constraint
    value: 5
    unit: hits
    notes: "Calibration constraint: any real-use catalogue object must kill a standard enemy
      (HP_ennemi_basique=12) in <= 5 hits at stage_mult=1.0. Applies to the primary use mode
      of each object (throw for throw-primary objects, melee for melee-primary). Objects with
      melee_damage_base=1 (mug_cafe, livre) are throw-primary — their melee role is cosmetic;
      the constraint applies to their throw_damage_base instead. Violation = Pilier 2 broken."
    added: 2026-04-08
    revised: ""

  - name: damage_base_ceiling
    status: active
    source: design/gdd/catalogue-objets.md
    referenced_by:
      - design/gdd/catalogue-objets.md
      - design/gdd/systeme-degats.md  # S06 parameter range is 1-15
    value: 15
    unit: HP
    notes: "Maximum damage_base (melee or throw) for any catalogue object. S06 parameter range
      is 1-15. MVP highest actual value: chaise throw_damage_base=10. The ceiling of 15 is
      reserved for a hypothetical heavy weapon; do not use for common objects."
    added: 2026-04-08
    revised: ""

  - name: stage_mult_ceiling
    status: active
    source: design/gdd/catalogue-objets.md
    referenced_by:
      - design/gdd/catalogue-objets.md
      - design/gdd/systeme-degats.md  # S06 tuning knob safe max = 2.0
    value: 2.0
    unit: multiplier
    notes: "Maximum stage_mult (melee or throw) for any StageData entry. Exception: bouteille
      throw_dmg_mult at final stage = 2.0 exactly (design intent: one-shot capability). Values
      above 2.0 risk trivializing late-wave combat. S06 and S05 agree on this ceiling."
    added: 2026-04-08
    revised: ""

  - name: throw_dmg_mult_safe_floor
    status: active
    source: design/gdd/systeme-degats.md
    referenced_by:
      - design/gdd/systeme-degats.md
      - design/gdd/catalogue-objets.md  # ⚠ THREE entries fall below this floor (see note)
    value: 0.75
    unit: multiplier
    notes: "S06 Tuning Knob safe minimum for throw_dmg_mult. S05 F2 variable table states
      the throw_dmg_mult range as 0.3-2.0 — broader than this safe floor.
      KNOWN ADVISORY INCONSISTENCY: Three S05 entries fall below 0.75:
        - lampe_bureau stade 2: throw_dmg_mult=0.7
        - livre stade 1: throw_dmg_mult=0.7
        - moniteur stade 1: throw_dmg_mult=0.6
      These are intentional design choices (degraded objects deal less throw damage),
      not formula errors. The formula remains correct at these values. However, if these
      objects were throw-primary, they might violate KILL_FEEL_MAX at late stages.
      Flagged for validation at prototype. Resolution: either raise S06 safe floor advisory
      to acknowledge intended sub-0.75 values, or adjust S05 stade values upward."
    added: 2026-04-08
    revised: ""
