name: 🚀 README Dashboard

on:
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 20

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests

      - name: Créer MVP issues si nécessaire
        run: python .github/scripts/create_mvp_issues.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Synchroniser les corps des issues MVP
        run: python .github/scripts/sync_issue_bodies.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Mettre à jour le dashboard
        run: python .github/scripts/update_progress.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add README.md
          git commit -m "📊 auto update dashboard" || exit 0
          git push
