#     revised: ""


# ─── PERFORMANCE BUDGETS ──────────────────────────────────────────────────────
# Frame time allocations per system, against a defined total frame budget.
# Conflicts: allocations that sum to more than the total budget = unshippable.
#
# Register a budget when an ADR explicitly claims a frame time allocation.
# The registry lets /architecture-review verify the total doesn't exceed the target.

performance_budgets: []

# Example:
#
# performance_budgets:
#   - target_fps: 60
#     total_frame_budget_ms: 16.6
#     platform: PC             # PC | Console | Mobile | All
#     adr: docs/architecture/adr-0000-performance-targets.md
#     added: 2026-03-26
#     revised: ""
#
#   - system: combat
#     status: active
#     budget_ms: 2.0
#     adr: docs/architecture/adr-0003-combat-system.md
#     notes: "Includes physics queries, hitbox evaluation, and damage calculation"
#     referenced_by:
#       - docs/architecture/adr-0003-combat-system.md
#     added: 2026-03-26
#     revised: ""


# ─── API DECISIONS ───────────────────────────────────────────────────────────
# Which engine APIs are chosen for which purpose across the project.
# Conflicts: two ADRs using different APIs for the same purpose = inconsistent
# implementation that breaks when one system expects the other's API.
#
# Register an API decision when the choice is non-obvious and other ADRs might
# make a different choice for the same purpose without knowing this was decided.

api_decisions:
  - purpose: damage_calculation
    status: active
    api: "DamageCalculator.calculate(damage_base: int, stage_mult: float, damage_type: DamageCalculator.DamageType) -> int"
    not: "Autoload singleton; inline formula per-caller; instance methods"
    adr: docs/architecture/adr-0003-damage-calculator.md
    reason: "static func dans class_name offre l'accès global sans coût d'instanciation.
      La formule est stateless — aucun état à gérer. Centralise S06 Règle 1 : un seul
      point de modification si la formule change."
    referenced_by:
      - docs/architecture/adr-0003-damage-calculator.md
    added: 2026-04-10
    revised: ""

# Example:
#
# api_decisions:
#   - purpose: physics_raycast
#     status: active
#     api: PhysicsServer3D.space_get_direct_state()
#     not: RayCast3D node     # explicitly banned for this purpose
#     adr: docs/architecture/adr-0002-physics-architecture.md
#     reason: "Direct server calls avoid per-frame node overhead; 3× faster in profiling"
#     referenced_by:
#       - docs/architecture/adr-0002-physics-architecture.md
#       - docs/architecture/adr-0003-combat-system.md
#     added: 2026-03-26
#     revised: ""


# ─── FORBIDDEN PATTERNS ──────────────────────────────────────────────────────
# Architecture anti-patterns explicitly banned by accepted ADRs.
# When writing a new ADR, check this list — if the proposed approach matches
# a forbidden pattern, it must be reworked before the ADR can be Accepted.
#
# Register a pattern when an ADR explicitly bans it AND other ADRs might
# unknowingly use it (i.e., it's a tempting but wrong approach for this project).

forbidden_patterns:
  - pattern: autoload_for_player_systems
    status: active
    description: "Les systèmes spécifiques au joueur (GrabSystem, etc.) ne doivent pas
      être enregistrés comme Autoloads. Utiliser des nœuds enfants avec injection @export."
    why: "Un Autoload pour un système player-specific crée un couplage global implicite,
      rend les tests unitaires impossibles (impossible de mocker), et est sémantiquement
      incorrect — ce n'est pas un service global."
    adr: docs/architecture/adr-0001-grab-system.md
    added: 2026-04-09

  - pattern: node_path_coupling
    status: active
    description: "Interdit d'accéder aux dépendances d'un nœud via chemin absolu
      (get_node('../Camera'), get_tree().get_first_node_in_group(...)). Utiliser
      @export injection à la place."
    why: "Le couplage aux chemins de nœuds est cassant dès que la structure de scène
      change, et empêche les tests unitaires hors scène complète."
    adr: docs/architecture/adr-0001-grab-system.md
    added: 2026-04-09

  - pattern: player_body_impulse_coupling
    status: active
    description: "Interdit d'ajouter du code d'impulse RigidBody3D dans le script de
      mouvement du joueur (Player.gd ou équivalent). move_and_slide() ne pousse pas
      les RigidBody3D — c'est le comportement voulu, pas un bug à corriger."
    why: "Core Rule 7 de S01 : le joueur ne doit pas pousser les objets en marchant.
      Ajouter un impulse manuellement contredit cette règle et perturbe le système
      de saisie S02 (le joueur pourrait déplacer un objet qu'il tente de saisir)."
    adr: docs/architecture/adr-0002-player-body-type.md
    added: 2026-04-09

  - pattern: damage_calculator_stateful
    status: active
    description: "Interdit d'ajouter une variable d'instance, un signal, ou tout état
      à DamageCalculator. La classe ne doit contenir que l'enum DamageType et
      static func calculate(). Toute logique d'état autour des dégâts appartient
      à l'appelant (S02, S09) ou aux récepteurs (S07, S08)."
    why: "DamageCalculator est une fonction pure stateless par définition (S06 Règle 1).
      Ajouter un état casserait la testabilité directe (appel sans scène) et créerait
      une dépendance cachée entre tous les appelants via l'état partagé."
    adr: docs/architecture/adr-0003-damage-calculator.md
    added: 2026-04-10

# Example:
#
